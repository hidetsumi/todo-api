services:
  db:
    image: postgres:16-alpine
    container_name: mikan-api-db-dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mikan}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-mikan_dev}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mikan} -d ${POSTGRES_DB:-mikan_dev}"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: node:20-alpine
    container_name: mikan-api-migrate-dev
    working_dir: /app
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-mikan}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-mikan_dev}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./:/app
      - /app/node_modules
    command: sh -c "corepack enable && pnpm install && pnpm prisma migrate deploy"
    restart: "no"

volumes:
  postgres_data:
